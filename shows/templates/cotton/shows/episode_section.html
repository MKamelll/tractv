<div x-data="{focused: false}"
     class="flex flex-col h-full justify-start w-full gap-4">
    <div class="flex flex-row gap-4 h-full w-full items-start flex-1">
        <img src="https://img.daisyui.com/images/stock/photo-1635805737707-575885ab0820.webp"
             alt="episode_still"
             class="h-32 w-22">
        <div class="flex flex-col gap-4 flex-1">
            <h1 class="text-xl font-serif">In the Beginning</h1>
            <p class="text-sm">Reverend Philip Lambe is transferred from his rich rural parish to a tough Midlands city.</p>
        </div>
        <button class="btn btn-circle">
            <svg xmlns="http://www.w3.org/2000/svg"
                 fill="none"
                 viewBox="0 0 24 24"
                 stroke-width="2.5"
                 stroke="currentColor"
                 class="size-[1.2em]">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
            </svg>
        </button>
    </div>
    <div class="collapse collapse-arrow w-full h-full border border-primary">
        <input type="checkbox" />
        <div class="collapse-title font-semibold">reviews</div>
        <div class="collapse-content">
            <c-shows.add_review />
        </div>
    </div>
</div>
